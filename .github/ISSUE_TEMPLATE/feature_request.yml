name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to the WordPress Contributor Dashboard. Please describe the problem you are trying to solve and how the feature would help.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need, workflow, or limitation should this feature address?
      placeholder: Describe the contributor, maintainer, or reporting need behind this request.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the behavior, report, view, filter, data import, or workflow you have in mind.
    validations:
      required: true

  - type: textarea
    id: affected-area
    attributes:
      label: Affected area
      description: Which part of the dashboard would this touch?
      placeholder: |
        Examples:
        - Wrapped view
        - Ladder view
        - Onboarding view
        - Cohorts view
        - Event import API
        - Configuration
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there other approaches or workarounds you have considered?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add mockups, examples, links, videos, screenshots, or data notes that would help explain the request. Videos are always preferred.
    validations:
      required: false
